<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmazonDealCrawler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.5 19c-1.5 0-2.5-2-2.5-2H9s-1 2-2.5 2c-1.5 0-2.5-2-2.5-2h16s-1 2-2.5 2z"></path>
                    <path d="M22 17H2l2-14h16l2 14z"></path>
                </svg>
                <h1>Amazon DealCrawler</h1>
            </div>
            <p class="subtitle">Premium Outdoor Gear Scraper</p>
        </header>

        <main>
            <div class="controls-panel glass-panel">
                <div class="search-section">
                    <h2>Manual Search</h2>
                    <form id="search-form">
                        <div class="input-group">
                            <input type="text" id="brand-input" placeholder="e.g., Patagonia, North Face..." required />
                            <button type="submit" id="search-btn" class="btn primary-btn">
                                <span>Search</span>
                            </button>
                        </div>
                        <p class="hint">Prefix with ^ for exact match (e.g., ^Stanley)</p>
                    </form>
                </div>

                <div class="divider"></div>

                <div class="random-section">
                    <h2>Daily Random</h2>
                    <p class="desc">Search unsearched brands from your MasterList.</p>
                    <button id="random-btn" class="btn secondary-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                            </path>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <span>Run Random Scrape (3 Brands)</span>
                    </button>
                </div>
            </div>

            <div id="status-container" class="status-container hidden">
                <div class="loader"></div>
                <p id="status-text">Scraping Amazon...</p>
            </div>

            <div id="results-container" class="results-container hidden">
                <div class="results-header">
                    <h2 id="results-title">Results</h2>
                    <span class="badge" id="results-count">0 Deals</span>
                </div>
                <div class="deals-grid" id="deals-grid">
                    <!-- Deals will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Deal Card Template -->
    <template id="deal-card-template">
        <a href="#" target="_blank" class="deal-card" rel="noopener noreferrer">
            <div class="card-image-container">
                <img class="deal-image" src="" alt="Deal Image">
            </div>
            <div class="card-content">
                <h3 class="deal-title"></h3>
                <p class="deal-brand"
                    style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">
                </p>
                <div class="price-row">
                    <span class="current-price"></span>
                    <span class="list-price"></span>
                </div>
                <div class="discount-badge"><span class="discount-value"></span>% OFF</div>
            </div>
        </a>
    </template>

    <script src="app.js"></script>
</body>

</html>
